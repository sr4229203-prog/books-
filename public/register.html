<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - BookHub</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <div class="header-brand">
      <p class="eyebrow">BookHub</p>
      <h1>Create your account</h1>
    </div>
    <nav><a href="/">Home</a> | <a href="/login.html">Login</a></nav>
  </header>
  <main>
    <section class="page-panel">
      <div class="panel-copy">
        <h2>Join the reading community</h2>
        <p>Register now to unlock books, save read progress, and use the reader experience.</p>
      </div>
      <form id="register-form" class="form-panel">
        <label>Username<input type="text" name="username" required /></label>
        <label>Password<input type="password" name="password" required /></label>
        <button type="submit">Create account</button>
        <p id="register-error" class="error"></p>
      </form>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
