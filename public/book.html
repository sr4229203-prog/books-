<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Read Book - BookHub</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <div class="header-brand">
      <p class="eyebrow">Reader mode</p>
      <h1 id="book-title">Read Book</h1>
    </div>
    <nav><a href="/">Home</a> | <a href="#" id="logout-link">Logout</a></nav>
  </header>
  <main>
    <section class="book-header-panel">
      <div id="book-details" class="book-card"></div>
      <div class="reader-status">
        <p>Tip: Use the reader frame below for PDF viewing or the generated table view for Excel files.</p>
      </div>
    </section>
    <section class="book-content" id="book-content"></section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
